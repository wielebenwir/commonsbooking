name: E2E Tests

on:
  push:
    branches:
      - 'master'
      - 'release/**'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.txt'
  pull_request:
    branches:
      - 'master'
    paths-ignore:
      - 'docs/**'

env:
  DB_DATABASE: wordpress_test
  DB_USER: root
  DB_PASSWORD: ''

jobs:
  e2e:
    name: 'WP ${{ matrix.core.name }} on PHP ${{ matrix.php }}'
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        php:
          - '8.1'
          - '8.5'
        core:
          - {name: 'tested', version: 'null'}
          - {name: 'minimum', version: 'WordPress/WordPress#5.9'}
          - {name: 'trunk', version: 'WordPress/WordPress#master'}

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/build-plugin

      - name: Install wp-env systemwide
        shell: bash
        run: npm -g i @wordpress/env

      - name: Overwrite PHP version & core for wp-env
        run: >
          jq
          --arg php "${{ matrix.php }}"
          --arg core "${{ matrix.core.version }}"
          '. + {"phpVersion": $php} + (if $core == "null" then {} else {"core": $core} end)'
          tests/cypress/wordpress-files/e2e-override.json > .wp-env.test.override.json

      - name: setup wp env
        run: npm run env:test:start

      - name: install test data for e2e test
        run: npm run cypress:setup

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          install: false
          config-file: tests/cypress/cypress.config.js

      - name: Upload Cypress screenshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots-${{ matrix.php }}_${{ matrix.core.name }}
          path: ${{ github.workspace }}/tests/cypress/screenshots/

      - name: Enable API
        run: |
          wp-env --config=.wp-env.test.json run cli wp option patch insert commonsbooking_options_api api-activated on
          wp-env --config=.wp-env.test.json run cli wp option patch insert commonsbooking_options_api apikey_not_required on

      - name: Checkout GBFS validator
        uses: actions/checkout@v7
        with:
          repository: MobilityData/gbfs-validator
          path: gbfs-validator

      - name: Cache GBFS validator dependencies
        uses: actions/cache@v6
        with:
          path: gbfs-validator/node_modules
          key: ${{ runner.os }}-gbfs-validator-${{ hashFiles('gbfs-validator/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-gbfs-validator-

      - name: Install GBFS validator dependencies
        working-directory: gbfs-validator
        run: yarn

      - name: Run GBFS validator
        working-directory: gbfs-validator
        run: |
          NODE_TLS_REJECT_UNAUTHORIZED=0 node ./gbfs-validator/cli.js \
            -u http://localhost:1001/index.php?rest_route=/commonsbooking/v1/gbfs.json \
            -s report.json

      - name: Assert GBFS feed is valid
        working-directory: gbfs-validator
        run: jq -e '.summary.hasErrors == false' report.json

  rerun-on-failure:
    needs: e2e
    if: failure() && fromJSON(github.run_attempt) < 3
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          GH_DEBUG: api
        run: gh workflow run rerun.yml -r ${{ github.head_ref || github.ref_name }} -F run_id=${{ github.run_id }}
